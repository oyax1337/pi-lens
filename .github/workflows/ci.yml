name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  install-test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rule catalog report (non-blocking)
        continue-on-error: true
        run: npm run audit:rule-catalog

      - name: Pack tarball
        run: npm pack

      - name: Verify required files in tarball
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          echo "Checking tarball: $TARBALL"
          tar -tzf "$TARBALL" | grep -E "scripts/download-grammars\.js|index\.ts|package\.json" | sort
          tar -tzf "$TARBALL" | grep "scripts/download-grammars.js" || \
            (echo "ERROR: scripts/download-grammars.js missing from tarball" && exit 1)

      - name: Verify package.json entry points exist in tarball
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMPDIR"
          PKG="$TMPDIR/package"

          check_field() {
            local field="$1" value="$2"
            local path="$PKG/$value"
            if [ ! -f "$path" ]; then
              echo "ERROR: package.json '$field' points to '$value' which is missing from the tarball"
              exit 1
            fi
            echo "OK: $field -> $value"
          }

          MAIN=$(node -p "require('$PKG/package.json').main || ''" 2>/dev/null)
          [ -n "$MAIN" ] && check_field "main" "$MAIN"

          # Check exports map entries (string values only)
          node -e "
            const pkg = require('$PKG/package.json');
            const exp = pkg.exports;
            if (!exp) process.exit(0);
            const collect = (v) => typeof v === 'string' ? [v] : typeof v === 'object' ? Object.values(v).flatMap(collect) : [];
            collect(exp).forEach(f => { const fs = require('fs'); if (!fs.existsSync('$PKG/' + f)) { console.error('ERROR: exports entry missing from tarball: ' + f); process.exit(1); } else { console.log('OK: exports -> ' + f); } });
          "
          rm -rf "$TMPDIR"

      - name: Install from tarball (simulates pi install npm:pi-lens)
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          npm install -g "$TARBALL"

      - name: Verify grammars were downloaded
        shell: bash
        run: |
          GLOBAL_MODULES=$(npm root -g)
          GRAMMARS_DIR="$GLOBAL_MODULES/pi-lens/node_modules/web-tree-sitter/grammars"
          echo "Checking grammars at: $GRAMMARS_DIR"
          ls "$GRAMMARS_DIR"
          test -f "$GRAMMARS_DIR/tree-sitter-typescript.wasm" || \
            (echo "ERROR: tree-sitter-typescript.wasm not downloaded" && exit 1)
          echo "All grammar checks passed"

      - name: Load each extension entry point (catches missing files)
        shell: bash
        run: |
          INSTALL_DIR=$(npm root -g)/pi-lens
          node scripts/check-extensions.mjs "$INSTALL_DIR"

      - name: Verify extension loads via tsx (catches missing node_modules deps)
        shell: bash
        run: |
          INSTALL_DIR=$(npm root -g)/pi-lens
          # Simulate how pi loads extensions: tsx index.ts
          # ERR_MODULE_NOT_FOUND = missing dep (e.g. 'minimatch') → fail
          # Any other error = expected in CI (no pi API available) → pass
          cd "$INSTALL_DIR"
          npx tsx index.ts 2>&1 | tee /tmp/tsx-output.txt || true
          if grep -q "ERR_MODULE_NOT_FOUND\|Cannot find module" /tmp/tsx-output.txt; then
            echo "FAILED: missing module dependency detected"
            cat /tmp/tsx-output.txt
            exit 1
          fi
          echo "Extension import check passed"
