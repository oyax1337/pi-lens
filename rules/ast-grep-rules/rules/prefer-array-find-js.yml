id: prefer-array-find-js
language: JavaScript
severity: warning
message: "Use .find() instead of .filter()[0] — stops at first match"
note: |
  .filter() traverses the full array. .find() stops at the first match.
rule:
  any:
    - pattern: "$ARR.filter($$$ARGS)[0]"
    - pattern: "$ARR.filter($$$ARGS).shift()"
