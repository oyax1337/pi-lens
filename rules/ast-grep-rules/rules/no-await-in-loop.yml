id: no-await-in-loop
message: Don't use await inside of loops — consider Promise.all() for parallel execution
severity: warning
language: TypeScript
rule:
  all:
    - pattern: await $_
    - inside:
        stopBy:
          any:
            - kind: function_declaration
            - kind: arrow_function
            - kind: function_expression
            - kind: method_definition
        any:
          - kind: for_in_statement
          - kind: for_statement
          - kind: while_statement
          - kind: do_statement
    - not:
        inside:
          any:
            - kind: for_in_statement
            - kind: for_statement
            - kind: while_statement
            - kind: do_statement
    - not:
        # Polling/retry loops intentionally await in sequence (e.g. OAuth device flow, backoff)
        # Detected by presence of a sleep/delay call in the same loop body
        inside:
          stopBy:
            any:
              - kind: function_declaration
              - kind: arrow_function
              - kind: function_expression
              - kind: method_definition
          has:
            pattern: await $SLEEP($$$)
            constraints:
              SLEEP:
                regex: "^(sleep|delay|wait|setTimeout|setInterval|pause)$"
note: |
  Performing an await as part of each operation is an indication that
  the program is not taking full advantage of the parallelization benefits of async/await.
  Exception: polling/retry loops that intentionally sleep between attempts are valid.
  Grade 3.3 — moderate complexity, significant performance gain.
