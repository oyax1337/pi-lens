id: prefer-query-selector
language: TypeScript
severity: hint
message: "Use document.querySelector() instead of getElementById/getElementsByClassName"
note: |
  querySelector/querySelectorAll is the modern unified DOM selection API.
rule:
  any:
    - pattern: "document.getElementById($$$ARGS)"
    - pattern: "document.getElementsByClassName($$$ARGS)"
    - pattern: "document.getElementsByTagName($$$ARGS)"
