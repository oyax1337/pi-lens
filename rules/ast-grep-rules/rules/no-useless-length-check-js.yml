id: no-useless-length-check-js
language: JavaScript
severity: warning
message: "Use .some() instead of .filter().length check — short-circuits at first match"
note: |
  filter().length !== 0 traverses the full array. some() stops at the first match.
rule:
  any:
    - pattern: "$ARR.filter($$$ARGS).length !== 0"
    - pattern: "$ARR.filter($$$ARGS).length > 0"
    - pattern: "$ARR.filter($$$ARGS).length != 0"
