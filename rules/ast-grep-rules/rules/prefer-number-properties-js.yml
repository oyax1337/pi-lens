id: prefer-number-properties-js
language: JavaScript
severity: warning
message: "Use Number.isNaN()/Number.isFinite() instead of global isNaN()/isFinite()"
note: |
  Global isNaN() coerces its argument first. Number.isNaN(x) returns true only for NaN.
rule:
  any:
    - pattern: "isNaN($$$ARGS)"
    - pattern: "isFinite($$$ARGS)"
